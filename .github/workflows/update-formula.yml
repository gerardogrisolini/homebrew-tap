name: Update Formula

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0). Leave blank to use the latest release."
        required: false
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          EVENT_VERSION="${{ github.event.client_payload.version || '' }}"
          INPUT_VERSION="${{ inputs.version || '' }}"

          if [ -n "$EVENT_VERSION" ]; then
            VERSION="$EVENT_VERSION"
          elif [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            TAG=$(
              curl --fail --silent --show-error --location \
                https://api.github.com/repos/gerardogrisolini/mlx-server/releases/latest \
              | python3 -c 'import json, sys; print(json.load(sys.stdin)["tag_name"])'
            )
            VERSION="${TAG#v}"
          fi
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Error: version cannot be empty" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          ./update-formula.sh "${{ steps.version.outputs.version }}"

      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mlx-server.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update mlx-server to v${VERSION}"
          git push
